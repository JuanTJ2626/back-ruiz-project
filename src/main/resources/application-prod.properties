# ============================
# PERFIL PROD - Railway (variables de entorno inyectadas automáticamente)
# No tocar — Railway inyecta MYSQLHOST, MYSQLPORT, etc. al deployar
# ============================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================
# Optimización de conexiones DB (menos RAM)
# ============================
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ============================
# Reducir logs en prod (menos CPU)
# ============================
logging.level.root=WARN
logging.level.com.ruiz=INFO
