# ============================
# Configuración del Servidor
# ============================
server.port=8080

# ============================
# PERFIL ACTIVO
# ============================
# Cambia esto según donde quieras correr:
#   local   → MySQL XAMPP local
#   dev     → MySQL Railway (nube)
#   prod    → MySQL Railway (variables de entorno, para el deploy)
spring.profiles.active=dev

# ============================
# Configuración de JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================
# Configuración de Swagger / OpenAPI
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================
# Configuración de Jackson (JSON)
# ============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Mexico_City

# ============================
# Subida de archivos / Imágenes
# ============================
# Cloudinary — credenciales (sobreescritas por perfil o variables de entorno)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:tu-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:tu-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:tu-api-secret}

# URL base del servidor (para otros usos)
app.base-url=http://localhost:8080

# Límite de tamaño de archivos multipart (5 MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ============================
# Configuración de Email (Resend API)
# ============================
resend.api-key=${RESEND_API_KEY:re_JMScquVS_7povDFprYa78gCeBodutxVzT}
app.mail.from=${MAIL_FROM:noreply@reporteurbano.site}
