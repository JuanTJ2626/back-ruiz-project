# ============================
# PERFIL DEV - H2 Database (en memoria)
# No necesitas instalar nada, solo ejecutar la app
# ============================

# Conexión H2
spring.datasource.url=jdbc:h2:mem:ruiz_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Dialecto H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Consola H2 habilitada (accede en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
