# ============================
# Configuración del Servidor
# ============================
server.port=8080

# ============================
# Perfil activo: "dev" para H2 local, "prod" para MySQL/AWS
# Cambia a "prod" cuando tengas tus credenciales de AWS
# ============================
spring.profiles.active=dev

# ============================
# Configuración de JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================
# Configuración de Swagger / OpenAPI
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================
# Configuración de Jackson (JSON)
# ============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Mexico_City

# ============================
# Subida de archivos / Imágenes
# ============================
# Carpeta donde se guardan las imágenes (relativa al directorio de ejecución)
app.upload.dir=uploads

# URL base del servidor — el frontend usará esta URL para mostrar las imágenes
app.base-url=http://localhost:8080

# Límite de tamaño de archivos multipart (5 MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
